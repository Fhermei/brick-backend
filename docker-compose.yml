services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: brick_app
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - brick_network
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://brick:Fatunbi11.@db:5432/brickdatabase
      - REDIS_URL=redis://redis:6379

  db:
    image: postgres:15-alpine
    container_name: brick_db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: brickdatabase
      POSTGRES_USER: brick
      POSTGRES_PASSWORD: Fatunbi11.
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U brick -d brickdatabase"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - brick_network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: brick_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - brick_network
    restart: unless-stopped

networks:
  brick_network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local